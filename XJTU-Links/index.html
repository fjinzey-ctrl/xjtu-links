<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>西交常用网站汇总</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ee;
      --panel: #fffdf9;
      --text: #221f1f;
      --muted: #6f6a64;
      --line: #e7ded3;
      --brand: #b91c1c;
      --brand-dark: #8f1212;
      --gold: #b7791f;
      --blue: #2563a8;
      --green: #16815f;
      --ink: #2d2a26;
      --shadow: 0 18px 48px rgba(50, 35, 24, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(185, 28, 28, 0.09), transparent 38%),
        linear-gradient(315deg, rgba(37, 99, 168, 0.08), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      line-height: 1.65;
    }

    body.mobile-scroll-lock {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      max-width: 100%;
      min-width: 0;
    }

    .hero {
      padding: 34px 0 18px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
      gap: 18px;
      align-items: stretch;
    }

    .hero-main,
    .notice,
    .admission-strip,
    .toolbar,
    .category-nav,
    .developing-panel,
    .site-card,
    .empty-state,
    .note-box {
      background: rgba(255, 253, 249, 0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-main {
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .hero-main::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: linear-gradient(var(--brand), var(--gold), var(--blue));
    }

    .kicker {
      margin: 0 0 6px;
      color: var(--brand-dark);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead {
      max-width: 760px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 16px;
      text-indent: 2em;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 22px;
    }

    .stat {
      min-width: 0;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff8ef;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .notice {
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
      background: #2d2a26;
      color: #fffaf2;
    }

    .notice h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .notice p {
      margin: 8px 0 0;
      color: #e8ddcf;
      font-size: 14px;
      text-indent: 2em;
    }

    .notice-legend {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .notice-legend li {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border-top: 1px solid rgba(255, 255, 255, 0.16);
      padding-top: 8px;
      color: #f6eadb;
      font-size: 13px;
    }

    .notice-legend strong {
      color: #ffd58a;
      font-weight: 700;
      white-space: nowrap;
    }

    .notice-legend span {
      color: #e8ddcf;
    }

    .admission-strip {
      display: grid;
      grid-template-columns: minmax(170px, 0.42fr) minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 18px;
      margin: 4px auto 12px;
      border-left: 6px solid var(--brand);
    }

    .admission-strip[hidden] {
      display: none;
    }

    .admission-copy {
      min-width: 0;
    }

    .admission-kicker {
      margin: 0 0 2px;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .admission-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .admission-items {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .admission-items li {
      min-width: 0;
      padding: 7px 10px;
      border: 1px solid rgba(185, 28, 28, 0.16);
      border-radius: var(--radius);
      background: #fff8ef;
      color: #4b4037;
      font-size: 13px;
      line-height: 1.45;
    }

    .admission-qr {
      display: grid;
      grid-template-columns: 74px minmax(92px, auto);
      gap: 9px;
      align-items: center;
      margin: 0;
      padding-left: 12px;
      border-left: 1px solid var(--line);
    }

    .admission-qr img {
      width: 74px;
      height: 74px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .admission-qr figcaption {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .admission-qr strong {
      display: block;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px;
      margin: 12px auto 18px;
      backdrop-filter: blur(16px);
    }

    html[data-device="mobile"] .toolbar {
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      height: 48px;
      padding: 0 48px 0 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap input:focus {
      border-color: rgba(185, 28, 28, 0.6);
      box-shadow: 0 0 0 4px rgba(185, 28, 28, 0.12);
    }

    .search-icon {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      color: var(--muted);
      font-weight: 800;
      pointer-events: none;
    }

    .clear-btn,
    .filter-btn,
    .action-btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, background 0.18s;
    }

    .clear-btn {
      padding: 0 14px;
      white-space: nowrap;
    }

    .clear-btn:hover,
    .filter-btn:hover,
    .action-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(185, 28, 28, 0.45);
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .filter-btn {
      padding: 7px 12px;
      color: var(--muted);
    }

    .filter-btn.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: 245px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      padding-bottom: 34px;
      min-width: 0;
    }

    .side-rail {
      position: sticky;
      top: 104px;
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .category-nav {
      padding: 12px;
      box-shadow: none;
    }

    .category-nav h2,
    .developing-panel h2 {
      margin: 4px 6px 10px;
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0;
    }

    .category-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border-radius: var(--radius);
      border: 0;
      color: var(--ink);
      font-size: 14px;
      font: inherit;
      text-align: left;
      background: transparent;
      cursor: pointer;
    }

    .category-link:hover,
    .category-link.active {
      background: #f7e8dc;
      color: var(--brand-dark);
    }

    .developing-panel {
      padding: 12px;
      box-shadow: none;
    }

    .developing-list {
      display: grid;
      gap: 8px;
    }

    .developing-link {
      display: grid;
      gap: 5px;
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff8ef;
      color: var(--ink);
    }

    .developing-link:hover {
      border-color: rgba(185, 28, 28, 0.35);
      background: #fff1e4;
      color: var(--brand-dark);
    }

    .developing-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .developing-top strong {
      min-width: 0;
      font-size: 14px;
      line-height: 1.35;
    }

    .developing-top em {
      flex: 0 0 auto;
      padding: 2px 7px;
      border-radius: 999px;
      background: #efe4d7;
      color: var(--muted);
      font-size: 12px;
      font-style: normal;
    }

    .developing-desc {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: #efe4d7;
      color: var(--muted);
      font-size: 12px;
    }

    .section {
      scroll-margin-top: 128px;
      margin-bottom: 26px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 12px;
      padding: 0 2px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      min-width: 0;
    }

    .site-card {
      min-width: 0;
      max-width: 100%;
      padding: 16px;
      box-shadow: none;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    }

    .site-card:hover {
      transform: translateY(-2px);
      border-color: rgba(185, 28, 28, 0.36);
      box-shadow: 0 12px 30px rgba(50, 35, 24, 0.09);
    }

    .card-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .card-top > .badge {
      justify-self: start;
    }

    .category-meta {
      justify-self: start;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .category-meta strong {
      color: var(--brand-dark);
      font-weight: 700;
    }

    .site-card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .url {
      display: block;
      max-width: 100%;
      padding: 8px 10px;
      border: 1px solid #bfdbfe;
      border-left: 4px solid var(--blue);
      border-radius: var(--radius);
      background: #eff6ff;
      color: var(--blue);
      font-family: "Consolas", "Cascadia Mono", "Microsoft YaHei", monospace;
      font-size: 16px;
      line-height: 1.45;
      word-break: break-word;
      overflow-wrap: anywhere;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
    }

    .url:hover {
      border-color: #93c5fd;
      background: #dbeafe;
      color: #1d4e89;
    }

    .url-list {
      display: grid;
      gap: 7px;
      margin-top: 8px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1.3;
      background: #efe8de;
      color: var(--muted);
      white-space: nowrap;
    }

    .badge.important {
      background: #fff0c2;
      color: #8a4f00;
    }

    .badge.auth {
      background: #ede9fe;
      color: #5b21b6;
    }

    .badge.campus {
      background: #dbeafe;
      color: #1d4e89;
    }

    .badge.external {
      background: #dcfce7;
      color: #166534;
    }

    .badge.library {
      background: #e0f2fe;
      color: #075985;
    }

    .badge.retired {
      background: #e5e7eb;
      color: #4b5563;
    }

    .desc {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      text-indent: 2em;
    }

    .desc-toggle {
      display: none;
      margin: 4px 0 0 auto;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--blue);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 11px;
      font-size: 13px;
      min-width: 0;
    }

    .action-btn.primary {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .action-btn[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .empty-state,
    .note-box {
      padding: 20px;
      color: var(--muted);
      box-shadow: none;
    }

    .note-box {
      margin-top: 10px;
      border-left: 5px solid var(--gold);
    }

    .note-box h2 {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 20px;
      letter-spacing: 0;
    }

    .note-box p {
      margin: 0;
      text-indent: 2em;
    }

    .note-box p + p {
      margin-top: 8px;
    }

    .site-footer {
      width: 100%;
      margin: 0;
      padding: 18px 16px;
      background: var(--ink);
      color: #f6eadb;
      font-size: 14px;
      text-align: center;
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      white-space: pre-line;
    }

    .site-footer a {
      color: #ffd58a;
      font-weight: 700;
      text-decoration: none;
    }

    .site-footer a:hover {
      text-decoration: underline;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 14px;
      margin-top: 6px;
      white-space: normal;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 30;
      transform: translate(-50%, 16px);
      padding: 10px 14px;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: var(--shadow);
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    mark {
      padding: 0 2px;
      border-radius: 3px;
      background: #fde68a;
      color: inherit;
    }

    @media (max-width: 940px) {
      .hero-grid,
      .layout {
        grid-template-columns: 1fr;
      }

      .admission-strip {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .admission-items {
        grid-template-columns: 1fr;
      }

      .admission-qr {
        grid-template-columns: 64px minmax(0, 1fr);
        padding-left: 0;
        padding-top: 10px;
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .admission-qr img {
        width: 64px;
        height: 64px;
      }

      .side-rail {
        position: static;
      }

      .category-nav .nav-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .category-link {
        flex: 0 0 auto;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }

      body {
        background: var(--bg);
      }

      .shell {
        width: auto !important;
        max-width: none !important;
        min-width: 0;
        margin-left: 18px !important;
        margin-right: 18px !important;
      }

      .hero {
        padding-top: 10px;
      }

      .hero-main {
        padding: 20px 16px;
      }

      .notice {
        padding: 16px;
      }

      .notice-legend li {
        grid-template-columns: 1fr;
        gap: 2px;
      }

      .toolbar {
        position: static;
        padding: 12px;
        margin: 10px auto 14px;
        overflow: hidden;
      }

      .hero-grid,
      .layout,
      .cards,
      .site-card,
      .card-top,
      .url-list,
      .actions,
      .note-box,
      .category-nav,
      .developing-panel,
      .side-rail {
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .clear-btn {
        width: 100%;
      }

      .section-head {
        align-items: start;
        flex-direction: column;
      }

      .section-head p {
        text-align: left;
      }

      .card-top {
        grid-template-columns: 1fr;
      }

      .cards {
        gap: 10px;
      }

      .site-card {
        padding: 14px;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .action-btn {
        min-width: 0;
        padding: 0 8px;
        width: 100%;
        white-space: nowrap;
      }

      .filters {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }

      .filters::-webkit-scrollbar,
      .category-nav .nav-list::-webkit-scrollbar {
        display: none;
      }

      .filter-btn {
        flex: 0 0 auto;
      }

      .category-nav .nav-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        max-width: 100%;
        overflow: visible;
      }

      .category-link {
        width: 100%;
        min-height: 34px;
        padding: 7px 8px;
        font-size: 12px;
        line-height: 1.25;
        background: #fffaf5;
        border: 1px solid var(--line);
      }

      .stat {
        padding: 11px 12px;
      }

      .site-footer {
        padding-bottom: calc(18px + env(safe-area-inset-bottom));
      }
    }

    @media (max-width: 390px) {
      .actions {
        grid-template-columns: 1fr;
      }

      .url {
        font-size: 15px;
      }
    }

    html[data-device="mobile"] h1 {
      font-size: 32px;
    }

    html[data-device="mobile"],
    html[data-device="mobile"] body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    html[data-device="mobile"] .shell {
      width: auto !important;
      max-width: none !important;
      min-width: 0;
      margin-left: 18px !important;
      margin-right: 18px !important;
    }

    html[data-device="mobile"] .hero-grid,
    html[data-device="mobile"] .layout,
    html[data-device="mobile"] .cards,
    html[data-device="mobile"] .site-card,
    html[data-device="mobile"] .admission-strip,
    html[data-device="mobile"] .toolbar,
    html[data-device="mobile"] .category-nav,
    html[data-device="mobile"] .developing-panel,
    html[data-device="mobile"] .side-rail,
    html[data-device="mobile"] .note-box {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    html[data-device="mobile"] .layout,
    html[data-device="mobile"] .hero-grid,
    html[data-device="mobile"] .cards,
    html[data-device="mobile"] .admission-strip {
      grid-template-columns: 1fr;
    }

    html[data-device="mobile"] .category-nav {
      position: static;
    }

  <script>
    (function detectDeviceType() {
      const root = document.documentElement;

      function applyDeviceType() {
        const width = window.innerWidth;
        const pointerIsCoarse = window.matchMedia("(pointer: coarse)").matches;
        const ua = navigator.userAgent || "";
        const isMobileUA = /Android|iPhone|iPod|Mobile/i.test(ua);
        const isTabletUA = /iPad|Tablet/i.test(ua) || (pointerIsCoarse && width >= 700 && width <= 1180);
        const device = (isMobileUA || (pointerIsCoarse && width < 700)) ? "mobile" : (isTabletUA ? "tablet" : "desktop");

        root.dataset.device = device;
        if (document.body) {
          document.body.classList.toggle("mobile-scroll-lock", device === "mobile");
        }
      }

      applyDeviceType();
      document.addEventListener("DOMContentLoaded", applyDeviceType);
      window.addEventListener("resize", applyDeviceType, { passive: true });
      window.addEventListener("orientationchange", applyDeviceType, { passive: true });
    })();
  </script>

    const filters = [
      { id: "all", label: "全部" },
      ...tagDefinitions.map((tag) => ({ id: tag.id, label: tag.filterLabel || tag.label }))
    ];

    const state = {
      query: "",
      filter: "all",
      category: "all"
    };

    const $ = (selector) => document.querySelector(selector);
    const content = $("#content");
    const searchInput = $("#searchInput");

    function siteLinks(site) {
      if (site.links) return site.links;
      if (site.u) return [{ label: site.u, url: site.u }];
      if (site.short) {
        const url = `https://${site.short}.xjtu.edu.cn`;
        return [{ label: site.short, url }];
      }
      return [];
    }

    function getDisplayUrl(site) {
      return siteLinks(site).map((link) => link.label).join(" 或 ");
    }

    function linkList(site) {
      return siteLinks(site).map((link) => `
        <a class="url" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${markText(link.label)}</a>
      `).join("");
    }

    function normalize(text) {
      return String(text || "").toLowerCase().replace(/\s+/g, "");
    }

    function matchesSearchAndTag(site) {
      const haystack = normalize([
        site.n,
        site.short,
        site.u,
        site.d,
        siteLinks(site).map((link) => `${link.label} ${link.url}`).join(" "),
        tagDefinitions.filter((tag) => site[tag.id]).map((tag) => `${tag.label} ${tag.filterLabel || ""} ${tag.searchText || ""}`).join(" "),
        categories.find((item) => item.id === site.c)?.name
      ].join(" "));

      const byQuery = !state.query || haystack.includes(normalize(state.query));
      const byFilter = state.filter === "all" || Boolean(site[state.filter]);
      return byQuery && byFilter;
    }

    function matches(site) {
      const byCategory = state.category === "all" || site.c === state.category;
      return matchesSearchAndTag(site) && byCategory;
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function markText(text) {
      const safe = escapeHtml(text);
      const query = state.query.trim();
      if (!query) return safe;
      const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp(escapedQuery, "gi"), (match) => `<mark>${match}</mark>`);
    }

    function badges(site) {
      return tagDefinitions
        .filter((tag) => site[tag.id])
        .map((tag) => `<span class="badge ${escapeHtml(tag.className || "")}">${escapeHtml(tag.label)}</span>`)
        .join("");
    }

    function card(site) {
      const links = siteLinks(site);
      const displayUrl = getDisplayUrl(site);
      const category = categories.find((item) => item.id === site.c);
      const hasMultipleLinks = links.length > 1;
      const openButtons = links.map((link, index) => `
        <a class="action-btn ${index === 0 && !site.retired ? "primary" : ""}" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" ${site.retired ? "aria-disabled=\"true\"" : ""}>${hasMultipleLinks ? `点击跳转${index + 1}` : "点击跳转"}</a>
      `).join("");
      const copyButtons = links.map((link, index) => `
        <button class="action-btn" type="button" data-copy="${escapeHtml(link.url)}">${hasMultipleLinks ? `复制网址${index + 1}` : "复制网址"}</button>
      `).join("");

      return `
        <article class="site-card" data-category="${site.c}">
          <div class="card-top">
            <div>
              <h3>${markText(site.n)}</h3>
              <div class="url-list">
                ${linkList(site)}
              </div>
            </div>
            <span class="category-meta">所属分类 · <strong>${escapeHtml(category.name)}</strong></span>
          </div>
          <div class="badges">${badges(site)}</div>
          <p class="desc">${markText(site.d)}</p>
          <button class="desc-toggle" type="button" data-desc-toggle aria-expanded="false">更多</button>
          <div class="actions">
            ${openButtons}
            ${copyButtons}
          </div>
        </article>
      `;
    }

    function renderStats() {
      $("#stats").innerHTML = pageConfig.stats.map((item) => {
        const value = item.type === "total" ? sites.length : sites.filter((site) => site[item.tag]).length;
        return `
        <div class="stat">
          <strong>${value}</strong>
          <span>${escapeHtml(item.label)}</span>
        </div>
      `;
      }).join("");
    }

    function renderPageConfig() {
      $("#pageKicker").textContent = pageConfig.kicker || "";
      $("#pageTitle").textContent = pageConfig.title || "";
      $("#pageLead").textContent = pageConfig.lead || "";
      $("#noticeTitle").textContent = pageConfig.noticeTitle || "";
      $("#noticeText").textContent = pageConfig.noticeText || "";
      $("#noticeLegend").innerHTML = (pageConfig.legendItems || []).map((item) => `
        <li><strong>${escapeHtml(item.title)}</strong><span>${escapeHtml(item.text)}</span></li>
      `).join("");
      const admission = pageConfig.admissionStrip || {};
      $("#admissionStrip").hidden = admission.enabled === false;
      $("#admissionKicker").textContent = admission.kicker || "";
      $("#admissionTitle").textContent = admission.title || "";
      $("#admissionItems").innerHTML = (admission.items || []).filter(Boolean).map((item) => `<li>${escapeHtml(item)}</li>`).join("");
      $("#admissionQrWrap").hidden = !admission.qrSrc;
      $("#admissionQr").src = admission.qrSrc || "";
      $("#admissionQr").alt = admission.qrTitle ? `${admission.qrTitle}二维码` : "二维码";
      $("#admissionQrTitle").textContent = admission.qrTitle || "";
      $("#admissionQrHint").textContent = admission.qrHint || "";
      $("#noteTitle").textContent = pageConfig.noteTitle || "";
      $("#noteParagraphs").innerHTML = (pageConfig.noteParagraphs || []).map((text) => `<p>${escapeHtml(text)}</p>`).join("");
      const footerText = escapeHtml(pageConfig.footerText || "").replace(/\n/g, "<br>");
      const footerLinks = (pageConfig.footerLinks || []).filter((link) => link && link.url).map((link) => `
        <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.label || link.url)}</a>
      `).join("");
      $("#siteFooter").innerHTML = `${footerText}${footerLinks ? `<div class="footer-links">${footerLinks}</div>` : ""}`;
      document.title = pageConfig.title || document.title;
    }

    function renderDevelopingPages() {
      const panel = $("#developingPanel");
      const list = $("#developingPages");
      const pages = (developingPages || []).filter((page) => page && page.title && page.url);
      panel.hidden = !pages.length;
      list.innerHTML = pages.map((page) => `
        <a class="developing-link" href="${escapeHtml(page.url)}">
          <span class="developing-top">
            <strong>${escapeHtml(page.title)}</strong>
            <em>${escapeHtml(page.status || "开发中")}</em>
          </span>
          ${page.description ? `<span class="developing-desc">${escapeHtml(page.description)}</span>` : ""}
        </a>
      `).join("");
    }

    function renderFilters() {
      $("#filters").innerHTML = filters.map((filter) => `
        <button class="filter-btn ${state.filter === filter.id ? "active" : ""}" type="button" data-filter="${filter.id}">${filter.label}</button>
      `).join("");
    }

    function renderNav(visibleSites) {
      const items = [{ id: "all", name: "全部站点" }, ...categories];
      $("#categoryNav").innerHTML = items.map((category) => {
        const count = category.id === "all" ? visibleSites.length : visibleSites.filter((site) => site.c === category.id).length;
        return `
          <button class="category-link ${state.category === category.id ? "active" : ""}" type="button" data-nav="${category.id}">
            <span>${escapeHtml(category.name)}</span>
            <span class="count">${count}</span>
          </button>
        `;
      }).join("");
    }

    function renderContent() {
      const navVisible = sites.filter(matchesSearchAndTag);
      const visible = navVisible.filter((site) => state.category === "all" || site.c === state.category);
      renderNav(navVisible);
      renderFilters();

      if (!visible.length) {
        content.innerHTML = `
          <section class="empty-state">
            没有找到匹配的网站。可以换一个关键词，或切回“全部”筛选和“全部站点”分类。
          </section>
        `;
        return;
      }

      content.innerHTML = categories.map((category) => {
        const group = visible.filter((site) => site.c === category.id);
        if (!group.length) return "";
        return `
          <section class="section" id="${category.id}">
            <div class="section-head">
              <div>
                <h2>${escapeHtml(category.name)}</h2>
              </div>
              <p>${escapeHtml(category.hint)}，共 ${group.length} 个</p>
            </div>
            <div class="cards">
              ${group.map(card).join("")}
            </div>
          </section>
        `;
      }).join("");
      requestAnimationFrame(updateDescToggles);
    }

    function updateDescToggles() {
      const isMobile = document.documentElement.dataset.device === "mobile";
      document.querySelectorAll(".site-card").forEach((card) => {
        const desc = card.querySelector(".desc");
        const toggle = card.querySelector("[data-desc-toggle]");
        if (!desc || !toggle) return;
        card.classList.remove("has-desc-overflow");
        toggle.hidden = true;
        if (!isMobile) {
          card.classList.remove("desc-expanded");
          toggle.setAttribute("aria-expanded", "false");
          toggle.textContent = "更多";
          return;
        }

        const lineHeight = parseFloat(getComputedStyle(desc).lineHeight) || 20;
        const needsToggle = desc.scrollHeight > lineHeight * 2 + 3;
        if (needsToggle) {
          card.classList.add("has-desc-overflow");
          toggle.hidden = false;
          const expanded = card.classList.contains("desc-expanded");
          toggle.setAttribute("aria-expanded", String(expanded));
          toggle.textContent = expanded ? "收起" : "更多";
        } else {
          card.classList.remove("desc-expanded");
        }
      });
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("网址已复制");
      } catch {
        const input = document.createElement("input");
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        showToast("网址已复制");
      }
    }

    document.addEventListener("click", (event) => {
      const filterButton = event.target.closest("[data-filter]");
      if (filterButton) {
        state.filter = filterButton.dataset.filter;
        renderContent();
        return;
      }

      const navButton = event.target.closest("[data-nav]");
      if (navButton) {
        state.category = navButton.dataset.nav;
        renderContent();
        return;
      }

      const descToggle = event.target.closest("[data-desc-toggle]");
      if (descToggle) {
        const card = descToggle.closest(".site-card");
        if (!card) return;
        const expanded = card.classList.toggle("desc-expanded");
        descToggle.setAttribute("aria-expanded", String(expanded));
        descToggle.textContent = expanded ? "收起" : "更多";
        return;
      }

      const copyButton = event.target.closest("[data-copy]");
      if (copyButton) {
        copyText(copyButton.dataset.copy);
      }
    });

    searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      renderContent();
    });

    $("#clearBtn").addEventListener("click", () => {
      state.query = "";
      state.filter = "all";
      state.category = "all";
      searchInput.value = "";
      renderContent();
      searchInput.focus();
    });

    window.addEventListener("resize", () => requestAnimationFrame(updateDescToggles), { passive: true });
    window.addEventListener("orientationchange", () => requestAnimationFrame(updateDescToggles), { passive: true });

    renderPageConfig();
    renderDevelopingPages();
    renderStats();
    renderContent();
  </script>
</body>
</html>
